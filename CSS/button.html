<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <style>
        .uber{
            background-color: black;
            color: white;
            border: none;
            height: 30px;
            width: 120px;
            padding: 10px 15px;
            padding-bottom: 25px;
          }
          .addtocart{
            color: black;
            background-color: rgb(234, 234, 4);
            border: none;
            border-radius: 20px;
            width: 180px;
            height: 30px;
           font-size: medium;
          }
          .signup{
background-color: rgb(63, 174, 63);
color: white;
border: none;
border-style: solid;
height: 40px;
width: 80px;
margin-left: 20px;
border-radius: 8px;
font-weight: bold;
          }

    </style>
</head>
<body>
    <button  class="uber">Request now</button>
     <button  class="addtocart">Add to cart</button>
       <button  class="signup">Sign up</button>
</body>
</html>
